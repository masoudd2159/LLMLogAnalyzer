# ============================================================
# Application Configuration
# ============================================================

spring.application.name=LLMLogAnalyzer
server.port=8081


# ============================================================
# MongoDB Configuration
# ============================================================
# MongoDB database used for storing log classification results,
# evaluation metrics, model outputs, and experiment data.

spring.data.mongodb.host=127.0.0.1
spring.data.mongodb.port=27017
spring.data.mongodb.database=LLMLogAnalyzer


# ============================================================
# OpenAI / GPT Configuration
# ============================================================
# Used only if the project is configured to call OpenAI models.
# Replace {OPENAI_API_KEY} with your real API key or load it from
# environment variables for better security.

openai.api.key={OPENAI_API_KEY}
model.api.gpt.model-name=GPT-5 nano
model.api.gpt.url=https://api.openai.com/v1/chat/completions


# ============================================================
# Ollama Configuration
# ============================================================
# Local Ollama API used for running open-source LLMs locally.
# Current model: qwen2.5:3b

model.api.ollama.url=http://localhost:11434/api/chat
model.api.ollama.model-name=qwen2.5:3b


# ============================================================
# Dataset Locations
# ============================================================
# BGL dataset path.
# For quick testing, use BGL_2k.log.
# For final thesis experiments, you can replace this with a
# larger or template-stratified BGL sample.

bgl.location=D:/Programming/Thesis/Dataset/BGL/BGL_2k.log

# HDFS dataset path.
# Used when running HDFS log anomaly detection experiments.

hdfs.location=D:/Programming/Thesis/Dataset/HDFS_v1/HDFS.log


# ============================================================
# Spring Profiles
# ============================================================
# Do not enable this by default.
# Run with profile manually when needed:
#
# Generate charts only:
# mvn spring-boot:run -Dspring-boot.run.profiles=charts
#
# Parse BGL logs only, if you created a bgl-parser profile:
# mvn spring-boot:run -Dspring-boot.run.profiles=bgl-parser
#
# If this line is enabled, the selected profile will run every
# time the application starts.

# spring.profiles.active=charts